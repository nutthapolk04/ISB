<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paywire — Example Web POS</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div id="banner" class="banner banner-disconnected">
      <span id="banner-text">Connecting to Paywire…</span>
    </div>
  </header>

  <main>
    <section class="card">
      <h2>Amount (THB)</h2>
      <div id="amount-display" class="amount-display">0.00</div>
      <div class="keypad">
        <button class="key" data-key="1">1</button>
        <button class="key" data-key="2">2</button>
        <button class="key" data-key="3">3</button>
        <button class="key" data-key="4">4</button>
        <button class="key" data-key="5">5</button>
        <button class="key" data-key="6">6</button>
        <button class="key" data-key="7">7</button>
        <button class="key" data-key="8">8</button>
        <button class="key" data-key="9">9</button>
        <button class="key key-clear" data-key="C">C</button>
        <button class="key" data-key="0">0</button>
        <button class="key key-backspace" data-key="⌫">⌫</button>
      </div>
    </section>

    <section class="card">
      <h2>Payment</h2>
      <!-- Buttons are rendered from edc.capabilities — the set adapts to whichever
           terminal (VTI / LinkPOS) Paywire reports. -->
      <div id="pay-buttons" class="btn-grid"></div>
    </section>

    <section class="card">
      <h2>Management</h2>
      <div id="mgmt-buttons" class="btn-grid"></div>
    </section>

    <section class="card event-card">
      <h2>Events <span id="event-reqid" class="reqid"></span></h2>
      <ul id="event-list"></ul>
    </section>

    <section id="receipt-section" class="card receipt-card" hidden>
      <h2>Receipt</h2>
      <dl id="receipt"></dl>
    </section>
  </main>

  <script src="pos.js" type="module"></script>
</body>
</html>
